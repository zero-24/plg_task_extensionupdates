PLG_TASK_EXTENSIONUPDATES="Taak - Melding van updates voor extensies"
PLG_TASK_EXTENSIONUPDATES_EMAIL_DESC="Een door komma's gescheiden lijst met de e-mailadressen die de e-mails met updatemeldingen zullen ontvangen. De adressen in de lijst MOETEN toebehoren aan bestaande gebruikers van uw site die het Super Administrator-recht hebben. Als geen van de vermelde e-mailadressen van Super Users is, of als het veld leeg is gelaten, ontvangen alle Super Users van deze site de update-melding per e-mail."
PLG_TASK_EXTENSIONUPDATES_EMAIL_LBL="Administrator E-mails"
PLG_TASK_EXTENSIONUPDATES_SEND_TITLE="Extensie update bericht"
PLG_TASK_EXTENSIONUPDATES_SEND_DESC="Met deze taak wordt periodiek gecontroleerd of er nieuwe extensie-updates beschikbaar zijn. Wanneer er een wordt gevonden, wordt er een e-mail gestuurd met een herinnering om te updaten. Je kunt de e-mail aanpassen via Systeem &rarr; E-mailsjablonen."
PLG_TASK_EXTENSIONUPDATES_LANGUAGE_OVERRIDE_DESC="Selecteer een taal voor de e-mails met updatemeldingen. Stel in op Auto om ze op dat moment in de taal van de site te verzenden."
PLG_TASK_EXTENSIONUPDATES_LANGUAGE_OVERRIDE_LBL="E-mail taal"
PLG_TASK_EXTENSIONUPDATES_LANGUAGE_OVERRIDE_NONE="Automatisch"
PLG_TASK_EXTENSIONUPDATES_UPDATE_MAIL_BODY="Hallo\nEr is een update op je site {SITENAME} ({URL}) voor de extensie: {EXTENSIONNAME} ({EXTENSIONTYPE}).\nDe nieuwe update heeft versie: {NEWVERSION}\nMomenteel geïnstalleerd is versie: {CURVERSION}\ n\nGebruik deze link om in te loggen en de extensie bij te werken: {UPDATELINK}"
; You can use the following merge codes:
; {NEWVERSION}		New extension version, e.g. 1.2.3
; {CURVERSION}		Currently installed extension version, e.g. 1.2.0
; {SITENAME}		Site name, as set in Global Configuration.
; {URL}				URL of the site's frontend page.
; {UPDATELINK}		Update URL (link to com_installer, will request login if the Super User isn't already logged in).
; {EXTENSIONTYPE}	Type of the extension e.g. plugin or component
; {EXTENSIONNAME}	Name of the extension
; {EXTENSIONID}		ID of the extension
; \n				Newline character. Use it to start a new line in the email.
PLG_TASK_EXTENSIONUPDATES_UPDATE_MAIL_SUBJECT="Extensie-update beschikbaar voor {SITENAME} – {URL}"
PLG_TASK_EXTENSIONUPDATES_MAIL_EXTENSION_UPDATE_DESC="Verzonden naar de sitebeheerders wanneer de &quot;Melding van updates voor extensies&quot; taak een update detecteert."
PLG_TASK_EXTENSIONUPDATES_MAIL_EXTENSION_UPDATE_TITLE="Updates voor extensies beschikbaar"
PLG_TASK_EXTENSIONUPDATES_XML_DESCRIPTION="Met deze taak wordt periodiek gecontroleerd of er nieuwe extensie-updates beschikbaar zijn. Wanneer er een wordt gevonden, wordt er een e-mail gestuurd met een herinnering om te updaten. Je kunt de e-mail aanpassen via Systeem &rarr; E-mailsjablonen."

