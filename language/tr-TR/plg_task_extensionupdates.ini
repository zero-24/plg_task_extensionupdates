PLG_TASK_EXTENSIONUPDATES="Görev - Eklenti Güncelleme Bildirimi"
PLG_TASK_EXTENSIONUPDATES_EMAIL_DESC="Güncelleme bildirimi e-postalarını alacak e-posta adreslerinin virgülle ayrılmış listesi. Listedeki adresler sitenizin Süper Kullanıcı ayrıcalığına sahip mevcut kullanıcılarına ait OLMALIDIR. Listelenen e-postalardan hiçbiri Süper Kullanıcılara ait değilse veya boş bırakılırsa bu sitenin tüm Süper Kullanıcıları güncelleme bildirimi e-postasını alacaktır."
PLG_TASK_EXTENSIONUPDATES_EMAIL_LBL="Süper Kullanıcı E-postaları"
PLG_TASK_EXTENSIONUPDATES_SEND_TITLE="Eklenti Güncelleme Bildirimi"
PLG_TASK_EXTENSIONUPDATES_SEND_DESC="Bu görev yeni eklenti güncellemelerinin kullanılabilirliğini düzenli aralıklarla kontrol eder. Bunlardan biri bulunduğunda size güncellemenizi hatırlatan bir e-posta gönderecektir. E-postayı Sistem &rarr; adresinden özelleştirebilirsiniz. Posta Şablonları."
PLG_TASK_EXTENSIONUPDATES_LANGUAGE_OVERRIDE_DESC="Güncelleme bildirimi e-postaları için bir dil seçin. Bunları o anda site dilinde göndermek için Otomatik olarak ayarlayın."
PLG_TASK_EXTENSIONUPDATES_LANGUAGE_OVERRIDE_LBL="E-posta Dili"
PLG_TASK_EXTENSIONUPDATES_LANGUAGE_OVERRIDE_NONE="Otomatik"
PLG_TASK_EXTENSIONUPDATES_UPDATE_MAIL_BODY="Merhaba\n{SITENAME} ({URL}) sitenizde şu eklenti için bir güncelleme var: {EXTENSIONNAME} ({EXTENSIONTYPE}).\nYeni güncelleme sürümü: {NEWVERSION}\nŞu anda yüklü olan sürüm: {CURVERSION}\n\nGiriş yapmak ve eklentiyi güncellemek için lütfen bu bağlantıyı kullanın: {UPDATELINK}"
; You can use the following merge codes:
; {NEWVERSION}		New extension version, e.g. 1.2.3
; {CURVERSION}		Currently installed extension version, e.g. 1.2.0
; {SITENAME}		Site name, as set in Global Configuration.
; {URL}				URL of the site's frontend page.
; {UPDATELINK}		Update URL (link to com_installer, will request login if the Super User isn't already logged in).
; {EXTENSIONTYPE}	Type of the extension e.g. plugin or component
; {EXTENSIONNAME}	Name of the extension
; {EXTENSIONID}		ID of the extension
; \n				Newline character. Use it to start a new line in the email.
PLG_TASK_EXTENSIONUPDATES_UPDATE_MAIL_SUBJECT="{SITENAME} – {URL} için Eklenti Güncellemesi mevcut"
PLG_TASK_EXTENSIONUPDATES_MAIL_EXTENSION_UPDATE_DESC="&quot;Eklenti Güncelleme Bildirimi&quot; geldiğinde site yöneticilerine gönderilir. Görev eklentisi bir güncelleme algıladı."
PLG_TASK_EXTENSIONUPDATES_MAIL_EXTENSION_UPDATE_TITLE="Eklenti Güncelleme Bildirimi"
PLG_TASK_EXTENSIONUPDATES_XML_DESCRIPTION="Bu görev yeni eklenti güncellemelerinin kullanılabilirliğini düzenli aralıklarla kontrol eder. Bunlardan biri bulunduğunda size güncellemenizi hatırlatan bir e-posta gönderecektir. E-postayı Sistem &rarr; adresinden özelleştirebilirsiniz. Posta Şablonları."

